# Bun configuration — supply-chain hardening
#
# 背景: 2025 年の "Mini Shai-Hulud 2nd" 攻撃のように、npm/Bun の lifecycle script や
# optionalDependencies を悪用したサプライチェーン攻撃が常態化している。
# このリポジトリは Makefile で `bun install --ignore-scripts` を強制し、
# bunfig.toml でも明示的な trustedDependencies を空にしておく。
#
# 攻撃概要と invariant の正本: docs/architecture/harness.md
# 設計判断: docs/adr/0001-supply-chain-hardening.md

[install]
# Bun はデフォルトで「top 500 npm パッケージ」の lifecycle script を暗黙信頼する
# 仕様 (公式 docs: install/lifecycle)。Wave 2 のように人気パッケージが乗っ取られた
# ケースでは穴になりうるため、本ファイルで明示的に空配列に上書きし、暗黙信頼ゼロにする。
# husky の prepare は `make setup-hooks` で明示的に実行する。
# 新たに追加したいパッケージがあれば、ADR で正当化したうえでここに名前を足す。
trustedDependencies = []

# 監査時の進捗をログに残し、後追いしやすくする
saveTextLockfile = true
